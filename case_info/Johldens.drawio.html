pues dentro de un mismo trabajo puden haber mas de un producto&amp;amp;nbsp;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Al crear un CLINIC, DOCTOR, PRODUCT debe quedar por default como activo &amp;quot;TRUE&amp;quot; en su status&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Al crearce un JOB debe quedar por default como REGISTRADO en su status&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;div&amp;gt;Metodos o funciones que debe poder desarrollar cda entidad&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;BOX&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_box(color,numer)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_box(id_box)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_available_box()&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_available_box_by_color(color)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;change_box_status(id_box, status)&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;JOB&amp;lt;/span&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_job(id_doctor, id_patient, id_product, id_box)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_job(id_job)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_job_by_status(status)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;add_picture(id_job)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_today_jobs()&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;assign_box(id_job, id_box)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;release_box(id_job)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;change_job_status(id_job)&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;li&amp;gt;DOCTOR&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_doctor(id_doctor,name, last_name, email, telephone, id_clinic)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_doctor(id_doctor)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;update_doctor_info(datos)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_doctors()&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_doctors_by_clinic(id_clinic)&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;li&amp;gt;CLINIC&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_clinic(id_clinic, name, address, telephone)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_clinic(id_clinic)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;update_clinic(id_clinic, datos)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_clinics()&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;li&amp;gt;PATIENT&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_patient(id_patient, name, lastname)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_patient(id_patient)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;update_patient_info(datos)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_patients_by_month&amp;amp;nbsp;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;li&amp;gt;PRODUCT&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_product(id_product, name, price, production_time)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_product(id_product)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_active_products()&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;li&amp;gt;INVOICE&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_invoice(id_job, amount)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_invoice(id_invoice)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_invoices_by_doctor(id_doctor)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_invoices_by_clinic(id_doctor)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_invoices_by_paystate(paystate)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;add_pay_invoice(id_invoice, amount)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;lending_balance_by_doctor(id_doctor)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;lending_balance_by_clinic(id_clinic)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;total_invoices_last_month_by_doctor(id_doctor)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;total_invoices_last_month_by_clinic(id_clinic)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;total_billed_by_doctor(id_doctor)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;total_billed_by_clinic(id_doctor)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;update_paystate(id_invoice)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_existence_invoice_for_job(id_job)&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;li&amp;gt;PAYMENT&amp;lt;/li&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;create_payment(id_invoice, amount, payment_type)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;check_payment(id_pament)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;list_payments_by_invoice(id_invoice)&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;Requerimientos del Cliente&amp;amp;nbsp;&amp;lt;/div&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;El DOCTOR debe poder enviar las fotos &amp;quot;o no&amp;quot; diretamente a la aplicacion JOB&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;El DOCTOR debe poder ver en que estado o proceso va su trabajo&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Los tabajos deben tener una fecha de ingreso y una fecha estimada de entrega (cada producto tiene cierto tiempo en produccion)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Se debe poder entregar un Informa de trabajos para ese dia, donde muestre los trabajos que deberian tenerse terminados a la fecha, eso conbase en la fecha estimada deentrega.&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Se deben poder generar facturas (INVOICE) para llevar contabilidad.&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Se debe poder generar un informe mensual de la facturacion hecho por CLINICA y por DOCTOR&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;El Usuario quiere explorar la posibilidad de poder llevar un rastreo del estado actual del trabajo en tiempo real (Tipo seguimiento de envio o Shipping)&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;El usuario quiere poder tener un repote de los trabajops que deben terminarse para la fecha actual, se logra mediante la suma de la fecha de entrada del trabajo mas el tiempo en produccion que demore el producto, entry_date + production_time = expected_exit_date&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;490\&quot; width=\&quot;480\&quot; x=\&quot;200\&quot; y=\&quot;140\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n      &lt;/root&gt;\n    &lt;/mxGraphModel&gt;\n  &lt;/diagram&gt;\n&lt;/mxfile&gt;\n&quot;}"></div>
